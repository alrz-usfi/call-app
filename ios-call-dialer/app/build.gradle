plugins {
    id 'com.android.application'
}

android {
    namespace 'com.zteam.callapp'
    compileSdk 35

    defaultConfig {
        applicationId 'com.zteam.callapp'
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName '0.1.0-mvp'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
